version: '3'

services:
  go-wecomchan:
    # 使用预构建镜像（推荐）
    image: gowfqk/go-wecomchan:latest

    # 如果需要本地构建，注释上面的image，取消下面的build注释
    # build: .

    environment:
      - SENDKEY=发送时用来验证的key
      - WECOM_CID=企业微信公司ID
      - WECOM_SECRET=企业微信应用Secret
      - WECOM_AID=企业微信应用ID
      - WECOM_TOUID=@all
      # 缓存类型: none(不缓存), memory(内存缓存), redis(Redis缓存)
      - CACHE_TYPE=memory
    ports:
      - 8080:8080
    restart: unless-stopped
